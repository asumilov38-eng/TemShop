<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ТемШоп</title>
    <link rel="icon" type="image/x-icon" href="images/favicon.ico">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header class="header">
            <img src="images/mdi_shop.png" alt="Логотип" class="site-logo">
            <h1 class="logo">ТемШоп</h1>
            <p class="tagline">Стиль в каждой детали</p>
        </header>

        <!-- ГЛАВНЫЙ ЭКРАН: МУЖЧИНАМ / ЖЕНЩИНАМ -->
        <nav class="gender-categories" id="gender-view">
            <div class="category-card gender-card" onclick="showGender('men')">
                <img src="images/men.png" alt="Мужчинам" class="category-icon">
                <span>Мужчинам</span>
            </div>
            <div class="category-card gender-card" onclick="showGender('women')">
                <img src="images/women.png" alt="Женщинам" class="category-icon">
                <span>Женщинам</span>
            </div>
        </nav>

        <!-- ВТОРОЙ УРОВЕНЬ: КАТЕГОРИИ -->
        <nav class="categories" id="categories-view" style="display: none;">
            <button class="back-btn" onclick="showHome()">← Назад</button>
            <h2 id="gender-title" class="section-title"></h2>
            <div class="category-grid">
                <div class="category-card" onclick="showCategory('glasses')">
                    <img src="images/glasses.png" alt="Очки" class="category-icon">
                    <span>Очки</span>
                </div>
                <div class="category-card" onclick="showCategory('bracelets')">
                    <img src="images/bracelets.png" alt="Браслеты" class="category-icon">
                    <span>Браслеты</span>
                </div>
                <div class="category-card" onclick="showCategory('watches')">
                    <img src="images/watches.png" alt="Часы" class="category-icon">
                    <span>Часы</span>
                </div>
            </div>
        </nav>

        <!-- ТОВАРЫ -->
        <div id="products-view" class="products-view hidden">
            <button class="back-btn" onclick="showCategories()">← Назад к категориям</button>
            <h2 id="category-title" class="section-title"></h2>
            <div id="products-grid" class="products-grid"></div>
        </div>

        <footer class="footer">
            <div class="contacts">
                <h3>Связаться с нами</h3>
                <p style="color: #888; margin-bottom: 15px;">г. Вязники, Владимирская обл. | Доставка и самовывоз</p>
                <a href="https://t.me/AndreiShumilov12" target="_blank" class="contact-link">Telegram</a>
                <a href="https://vk.com/theme_67" target="_blank" class="contact-link">ВКонтакте</a>
                <a href="tel:+79049584282" class="contact-link">+7 904 958 42 82</a>
            </div>
        </footer>
    </div>

    <!-- Модальное окно товара -->
    <div id="product-modal" class="modal hidden">
        <div class="modal-content">
            <button class="close-modal" onclick="closeModal()">&times;</button>
            <div class="modal-gallery">
                <button class="gallery-btn prev" onclick="changeImage(-1)">&#10094;</button>
                <img id="modal-image" src="" class="modal-image">
                <button class="gallery-btn next" onclick="changeImage(1)">&#10095;</button>
            </div>
            <div class="modal-thumbnails" id="modal-thumbnails"></div>
            <div class="modal-info">
                <h2 id="modal-name"></h2>
                <p id="modal-description"></p>
                <div class="modal-price" id="modal-price"></div>
                <button class="order-btn" onclick="openOrderModal()">Заказать</button>
            </div>
        </div>
    </div>

    <!-- Модальное окно заказа -->
    <div id="order-modal" class="modal hidden">
        <div class="modal-content order-content">
            <button class="close-modal" onclick="closeOrderModal()">&times;</button>
            <h2>Оформление заказа</h2>
            <p id="order-product-name" style="margin-bottom:20px; color:#aaa;"></p>
            <div class="order-contacts">
                <a href="tel:+79049584282" class="order-contact-btn phone">Позвонить</a>
                <a href="https://t.me/AndreiShumilov12" target="_blank" class="order-contact-btn telegram">Telegram</a>
                <a href="https://vk.com/theme_67" target="_blank" class="order-contact-btn vk">ВКонтакте</a>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
