<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ТемШоп - стильные солнцезащитные очки, часы и браслеты в Вязниках. Мужские и женские аксессуары по доступным ценам.">
    <title>ТемШоп</title>
    <link rel="icon" type="image/x-icon" href="images/favicon.ico">
    
    <!-- Ускорение загрузки -->
    <link rel="preconnect" href="https://asumilov38-eng.github.io">
    <link rel="dns-prefetch" href="https://asumilov38-eng.github.io">
    <link rel="preload" href="images/mdi_shop.png" as="image">
    <link rel="preload" href="images/men.png" as="image">
    <link rel="preload" href="images/women.png" as="image">
    <link rel="preload" href="images/glasses.png" as="image">
    <link rel="preload" href="images/watches.png" as="image">
    <link rel="preload" href="images/bracelets.png" as="image">
    
    <link rel="stylesheet" href="style.css?v=5">
</head>
<body>

    <div class="container">
        <main>
            <header class="header">
                <img src="images/mdi_shop.png" alt="Логотип" class="site-logo" width="70" height="70" fetchpriority="high">
                <h1 class="logo">ТемШоп</h1>
                <p class="tagline">Стиль в каждой детали</p>
            </header>

            <nav class="gender-categories" id="gender-view">
                <div class="category-card gender-card" onclick="showGender('men')">
                    <img src="images/men.png" alt="Мужчинам" class="category-icon" width="80" height="80" loading="eager" fetchpriority="high">
                    <span>Мужчинам</span>
                </div>
                <div class="category-card gender-card" onclick="showGender('women')">
                    <img src="images/women.png" alt="Женщинам" class="category-icon" width="80" height="80" loading="eager" fetchpriority="high">
                    <span>Женщинам</span>
                </div>
            </nav>

            <nav class="categories" id="categories-view" style="display: none;">
                <button class="back-btn" onclick="showHome()">← Назад</button>
                <h2 id="gender-title" class="section-title"></h2>
                <div class="category-grid">
                    <div class="category-card" onclick="showCategory('glasses')">
                        <img src="images/glasses.png" alt="Очки" class="category-icon" width="60" height="60" loading="lazy">
                        <span>Очки</span>
                    </div>
                    <div class="category-card" onclick="showCategory('bracelets')">
                        <img src="images/bracelets.png" alt="Браслеты" class="category-icon" width="60" height="60" loading="lazy">
                        <span>Браслеты</span>
                    </div>
                    <div class="category-card" onclick="showCategory('watches')">
                        <img src="images/watches.png" alt="Часы" class="category-icon" width="60" height="60" loading="lazy">
                        <span>Часы</span>
                    </div>
                </div>
            </nav>

            <div id="products-view" class="products-view hidden">
                <button class="back-btn" onclick="showCategories()">← Назад к категориям</button>
                <h2 id="category-title" class="section-title"></h2>
                <div id="products-grid" class="products-grid"></div>
            </div>

            <footer class="footer">
                <div class="contacts">
                    <h3>Связаться с нами</h3>
                    <p style="color: #888; margin-bottom: 15px;">г. Вязники, Владимирская обл. | Доставка и самовывоз</p>
                    <a href="https://t.me/AndreiShumilov12" target="_blank" class="contact-link">Telegram</a>
                    <a href="https://vk.com/theme_67" target="_blank" class="contact-link">ВКонтакте</a>
                    <a href="tel:+79049584282" class="contact-link">+7 904 958 42 82</a>
                </div>
            </footer>
        </main>
    </div>

    <div id="product-modal" class="modal hidden">
        <div class="modal-content">
            <button class="close-modal" onclick="closeModal()">&times;</button>
            <div class="modal-gallery">
                <button class="gallery-btn prev" onclick="changeImage(-1)">&#10094;</button>
                <img id="modal-image" src="" class="modal-image" alt="" decoding="async">
                <button class="gallery-btn next" onclick="changeImage(1)">&#10095;</button>
            </div>
            <div class="modal-thumbnails" id="modal-thumbnails"></div>
            <div class="modal-info">
                <h2 id="modal-name"></h2>
                <p id="modal-description"></p>
                <div class="modal-price" id="modal-price"></div>
                <button class="order-btn" onclick="openOrderModal()">Заказать</button>
            </div>
        </div>
    </div>

    <div id="order-modal" class="modal hidden">
        <div class="modal-content order-content">
            <button class="close-modal" onclick="closeOrderModal()">&times;</button>
            <h2>Оформление заказа</h2>
            <p id="order-product-name" style="margin-bottom:20px; color:#aaa;"></p>
            <div class="order-contacts">
                <a href="tel:+79049584282" class="order-contact-btn phone">Позвонить</a>
                <a href="https://t.me/AndreiShumilov12" target="_blank" class="order-contact-btn telegram">Telegram</a>
                <a href="https://vk.com/theme_67" target="_blank" class="order-contact-btn vk">ВКонтакте</a>
            </div>
        </div>
    </div>

    <script src="data.js?v=5"></script>
    <script src="app.js?v=5"></script>
</body>
</html>
